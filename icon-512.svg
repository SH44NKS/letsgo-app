  <!-- Miles Morales style eyes (angular/modern) -->
  <path d="M76 72 Q82 65 88 70 Q84 78 78 77 Z" fill="white"/>
  <path d="M116 72 Q110 65 104 70 Q108 78 114 77 Z" fill="white"/>
  
  <!-- "LETS GO" text -->
  <text x="96" y="170" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white" letter-spacing="2">LETS GO!</text>
