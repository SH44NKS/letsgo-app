<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0A0A0F"/>
  <!-- Web pattern background -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="#E31212" stroke-width="1" opacity="0.15"/>
  <circle cx="96" cy="96" r="55" fill="none" stroke="#E31212" stroke-width="1" opacity="0.1"/>
  <line x1="96" y1="16" x2="96" y2="176" stroke="#E31212" stroke-width="0.8" opacity="0.1"/>
  <line x1="16" y1="96" x2="176" y2="96" stroke="#E31212" stroke-width="0.8" opacity="0.1"/>
  <line x1="39" y1="39" x2="153" y2="153" stroke="#E31212" stroke-width="0.8" opacity="0.08"/>
  <line x1="153" y1="39" x2="39" y2="153" stroke="#E31212" stroke-width="0.8" opacity="0.08"/>
  
  <!-- Spider body -->
  <ellipse cx="96" cy="108" rx="28" ry="34" fill="#E31212"/>
  <ellipse cx="96" cy="78" rx="20" ry="22" fill="#E31212"/>
  
  <!-- Black details on body -->
  <ellipse cx="96" cy="108" rx="28" ry="34" fill="#CC0000"/>
