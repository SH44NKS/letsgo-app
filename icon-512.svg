  <ellipse cx="96" cy="125" rx="24" ry="14" fill="none" stroke="#111" stroke-width="1.5"/>
  
  <!-- Legs left -->
  <line x1="68" y1="92" x2="28" y2="62" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="68" y1="104" x2="22" y2="96" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="68" y1="116" x2="28" y2="140" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="68" y1="128" x2="38" y2="155" stroke="#E31212" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Legs right -->
  <line x1="124" y1="92" x2="164" y2="62" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="124" y1="104" x2="170" y2="96" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="124" y1="116" x2="164" y2="140" stroke="#E31212" stroke-width="5" stroke-linecap="round"/>
  <line x1="124" y1="128" x2="154" y2="155" stroke="#E31212" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Head -->
